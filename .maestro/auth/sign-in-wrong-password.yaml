# Sad path: known email + wrong password surfaces the Supabase auth error.
# Requires TEST_EMAIL (an existing user) via env. No password env needed.
appId: com.workout.app
name: Auth · sign in wrong password
tags:
  - auth
  - backend
---
- runFlow: ../subflows/open-fresh.yaml
- tapOn:
    id: "email-input"
- inputText: ${TEST_EMAIL}
- tapOn:
    id: "password-input"
- inputText: "definitely-the-wrong-password"
- hideKeyboard
- tapOn:
    id: "signin-submit"
# Supabase returns "Invalid login credentials"; assert the error surfaces and we stay put.
- extendedWaitUntil:
    visible:
      id: "auth-error"
    timeout: 20000
- assertVisible:
    id: "signin-submit"
